<div class="products-container">
  <div class="products-card">

    <!-- TOP BAR -->
    <div class="products-top-bar">
      <div>
        <h2>📝 Blog Management</h2>
      </div>

      <div class="actions-section">
        <mat-form-field appearance="outline" class="search-field">
          <mat-label>Search Blog</mat-label>
          <input matInput (keyup)="applyFilter($event)" />
        </mat-form-field>
      </div>
    </div>

    <!-- TABLE -->
    <div class="table-wrapper">
      <table mat-table [dataSource]="dataSource" matSort>

        <!-- IMAGE -->
        <ng-container matColumnDef="image">
          <th mat-header-cell *matHeaderCellDef>Image</th>
          <td mat-cell *matCellDef="let b">
            <img [src]="getImageUrl(b.image)" class="product-img" />
          </td>
        </ng-container>

        <!-- TITLE -->
        <ng-container matColumnDef="title">
          <th mat-header-cell *matHeaderCellDef mat-sort-header>Title</th>
          <td mat-cell *matCellDef="let b">{{ b.title }}</td>
        </ng-container>

        <!-- AUTHOR -->
        <ng-container matColumnDef="author">
          <th mat-header-cell *matHeaderCellDef mat-sort-header>Author</th>
          <td mat-cell *matCellDef="let b">{{ b.author }}</td>
        </ng-container>

        <!-- CONTENT -->
        <ng-container matColumnDef="content">
          <th mat-header-cell *matHeaderCellDef>Content</th>
          <td mat-cell *matCellDef="let b">
            {{ b.content | slice:0:80 }}...
          </td>
        </ng-container>

        <!-- DATE -->
        <ng-container matColumnDef="created_at">
          <th mat-header-cell *matHeaderCellDef mat-sort-header>Date</th>
          <td mat-cell *matCellDef="let b">
            {{ b.created_at | date:'medium' }}
          </td>
        </ng-container>

        <!-- STATUS -->
        <ng-container matColumnDef="status">
          <th mat-header-cell *matHeaderCellDef>Status</th>
          <td mat-cell *matCellDef="let b">
            <span class="badge"
              [class.approved]="b.is_approved == 1"
              [class.pending]="b.is_approved == 0">
              {{ b.is_approved == 1 ? 'Approved' : 'Pending' }}
            </span>
          </td>
        </ng-container>

        <!-- ACTION -->
        <ng-container matColumnDef="action">
          <th mat-header-cell *matHeaderCellDef>Action</th>
          <td mat-cell *matCellDef="let b">

            <button *ngIf="b.is_approved == 0"
              class="btn edit"
              (click)="approveBlog(b.id)">
              Approve
            </button>

            <button class="btn delete"
              (click)="removeBlog(b.id)">
              Remove
            </button>

          </td>
        </ng-container>

        <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
        <tr mat-row *matRowDef="let row; columns: displayedColumns"></tr>

      </table>

      <mat-paginator [pageSize]="5" [pageSizeOptions]="[5, 10, 20]"></mat-paginator>

    </div>
  </div>
</div>
